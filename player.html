<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Player · Whalers Madness</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect rx='8' width='32' height='32' fill='%235eb8ff'/><text x='50%25' y='56%25' text-anchor='middle' font-size='18' font-family='system-ui' font-weight='900' fill='%230b0d12'>W</text></svg>">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <a class="brand" href="./">
        <span class="logo">W</span>
        Whalers Madness <small>NBA Playoffs 2026</small>
      </a>
      <nav class="site-nav">
        <a href="./" data-page="leaderboard">Leaderboard</a>
        <a href="teams.html" data-page="teams">Teams</a>
        <a href="players.html" data-page="players">Players</a>
        <a href="history.html" data-page="history">History</a>
      </nav>
      <span class="updated"><span class="dot"></span><span id="updated-at">Loading…</span></span>
    </div>
  </header>

  <main>
    <div id="player-header"></div>
    <div id="player-summary" class="stat-row"></div>
    <h2 class="section-title">Game Log</h2>
    <div class="table-wrap">
      <div class="table-scroll">
        <table class="stats gamelog-table" id="player-gamelog">
          <thead>
            <tr>
              <th class="left" data-sort-key="date" data-sort-default="desc">Date</th>
              <th class="left">Matchup</th>
              <th data-sort-key="MP">MP</th>
              <th data-sort-key="PTS">PTS</th>
              <th data-sort-key="TRB">REB</th>
              <th data-sort-key="AST">AST</th>
              <th class="hide-sm" data-sort-key="STL">STL</th>
              <th class="hide-sm" data-sort-key="BLK">BLK</th>
              <th class="hide-sm" data-sort-key="TOV">TOV</th>
              <th class="hide-sm" data-sort-key="TD">TD</th>
              <th data-sort-key="FP">FP</th>
            </tr>
          </thead>
          <tbody><tr><td colspan="11" class="loading">Loading game log</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <span>Data sourced from <a href="https://www.nba.com/" target="_blank" rel="noopener">nba.com</a>.</span>
  </footer>

  <script type="module" src="assets/js/player.js"></script>
</body>
</html>
