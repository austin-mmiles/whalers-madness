name: Update playoff data & deploy

on:
  # Every 30 minutes during the playoff window. Cron is UTC.
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "data/rosters.json"
      - "scripts/**"
      - "assets/**"
      - "*.html"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore boxscore cache
        uses: actions/cache@v4
        with:
          path: data/.cache
          key: boxscore-cache-v1

      - name: Fetch latest playoff data
        env:
          WM_SEASON: "2026"
        run: python scripts/update_stats.py

      - name: Commit updated JSON
        run: |
          set -e
          git config user.name "whalers-bot"
          git config user.email "whalers-bot@users.noreply.github.com"
          git add data/players.json data/leaderboard.json data/history.json data/meta.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: update playoff data $(date -u +%FT%TZ)"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
